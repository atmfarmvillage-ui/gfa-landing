<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande — ATM Farm Village</title>
<link rel="icon" type="image/png" href="https://app.avifarmer.net/icons/icon-192.png">
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="https://cdn.fedapay.com/checkout.js?v=1.1.7"></script>
<style>
:root{
  --bleu:#1B4FD8;--bleu2:#2563EB;--bleu3:#3B82F6;--bleu4:#EFF6FF;
  --bleu-sombre:#0F2B6B;--bleu-mid:#1E40AF;
  --vert:#059669;--or:#F59E0B;--rouge:#EF4444;
  --texte:#0F172A;--textm:#475569;--textl:#94A3B8;
  --blanc:#FFFFFF;--gris:#F8FAFC;--gris2:#F1F5F9;--border:#E2E8F0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--gris);color:var(--texte);min-height:100vh}

nav{padding:18px 32px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-icon{width:36px;height:36px;border-radius:8px;overflow:hidden;background:white;box-shadow:0 2px 8px rgba(15,43,107,.10);display:flex;align-items:center;justify-content:center}
.nav-logo-icon img{width:100%;height:100%;object-fit:contain}
.nav-logo-text{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--bleu-sombre)}
.nav-back{background:transparent;border:none;color:var(--textm);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
.nav-back:hover{color:var(--bleu)}

.wrap{max-width:920px;margin:32px auto;padding:0 20px;display:grid;grid-template-columns:1fr 380px;gap:32px;align-items:start}
.card{background:white;border-radius:14px;border:1px solid var(--border);padding:28px;box-shadow:0 4px 16px rgba(15,43,107,.04)}
h1{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--bleu-sombre);margin-bottom:6px;letter-spacing:-0.5px}
.subtitle{color:var(--textm);font-size:14px;margin-bottom:24px}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--texte);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field label .req{color:var(--rouge)}
.field input, .field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:white;transition:border-color .15s}
.field input:focus, .field textarea:focus{outline:none;border-color:var(--bleu3)}
.field textarea{min-height:70px;resize:vertical}
.field .hint{font-size:11px;color:var(--textl);margin-top:4px}
.geoloc-btn{background:var(--bleu4);border:1px dashed var(--bleu3);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--bleu);cursor:pointer;font-weight:600;margin-top:6px;display:flex;align-items:center;gap:8px;width:100%;justify-content:center;font-family:inherit}
.geoloc-btn:hover{background:var(--bleu);color:white}
.geoloc-btn.ok{background:#dcfce7;border-color:var(--vert);color:var(--vert)}

.mode-paiement{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.mode-card{background:white;border:1.5px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:all .15s}
.mode-card:hover{border-color:var(--bleu3)}
.mode-card.active{border-color:var(--bleu);background:var(--bleu4);box-shadow:0 4px 12px rgba(27,79,216,.15)}
.mode-card-ico{font-size:24px;margin-bottom:6px}
.mode-card-title{font-size:13px;font-weight:700;color:var(--bleu-sombre);margin-bottom:2px}
.mode-card-sub{font-size:11px;color:var(--textm)}

.btn-payer{width:100%;background:var(--bleu);color:white;padding:15px 24px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:20px;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 4px 14px rgba(27,79,216,.35)}
.btn-payer:hover:not(:disabled){background:var(--bleu-mid);transform:translateY(-1px)}
.btn-payer:disabled{opacity:.6;cursor:not-allowed}

.recap{position:sticky;top:20px}
.recap h2{font-family:'Fraunces',serif;font-size:18px;color:var(--bleu-sombre);margin-bottom:14px}
.recap-img{aspect-ratio:16/10;background:var(--gris2);border-radius:10px;overflow:hidden;margin-bottom:14px;display:flex;align-items:center;justify-content:center}
.recap-img img{width:100%;height:100%;object-fit:cover}
.recap-img-ph{font-size:48px;opacity:.3}
.recap-titre{font-size:15px;font-weight:700;color:var(--bleu-sombre);margin-bottom:6px;line-height:1.3}
.recap-line{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;color:var(--textm);border-bottom:1px solid var(--gris2)}
.recap-line.total{font-size:18px;color:var(--bleu-sombre);font-weight:800;border-bottom:none;padding-top:14px}
.recap-line.total .montant{font-family:'Fraunces',serif;font-size:22px;color:var(--bleu)}

.warning{background:#FEF3C7;border-left:4px solid var(--or);padding:12px 16px;border-radius:6px;font-size:13px;color:#78350F;margin-bottom:16px}
.warning b{color:#78350F}

.loading{text-align:center;padding:80px 20px;color:var(--textl)}

@media(max-width:768px){
  .wrap{grid-template-columns:1fr;padding:0 14px;margin:20px auto}
  .card{padding:20px}
  .recap{position:static;order:-1}
  h1{font-size:22px}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon"><img src="https://app.avifarmer.net/icons/icon-192.png" alt="ATM"></div>
    <div class="nav-logo-text">ATM Farm Village</div>
  </a>
  <a href="javascript:history.back()" class="nav-back">← Retour</a>
</nav>

<div id="contenu">
  <div class="loading">⏳ Préparation de la commande...</div>
</div>

<script src="js/shop-common.js"></script>
<script>
const params = new URLSearchParams(location.search);
const slug = params.get('slug') || '';
const qteInit = +params.get('q') || 1;
const modeInit = params.get('mode') || 'fedapay';
const gratuit = params.get('gratuit') === '1';
const nomPrerempli = params.get('nom') || '';
const telPrerempli = params.get('tel') || '';

let _produit = null;
let _mode = modeInit; // 'fedapay' | 'livraison'
let _geoloc = null;

async function init(){
  if(!slug){
    document.getElementById('contenu').innerHTML = '<div class="loading">⚠️ Produit introuvable. <a href="/boutique" style="color:var(--bleu);font-weight:700">Retour boutique</a></div>';
    return;
  }
  _produit = await trouverProduitParSlug(slug);
  if(!_produit){
    document.getElementById('contenu').innerHTML = '<div class="loading">⚠️ Ce produit n\'existe plus.</div>';
    return;
  }
  rendreCheckout();
}

function rendreCheckout(){
  const p = _produit;
  const isVirtuel = p.type === 'virtuel';
  const qte = isVirtuel ? 1 : qteInit;
  const total = gratuit ? 0 : (p.prix * qte);

  document.getElementById('contenu').innerHTML = `
    <div class="wrap">
      <div class="card">
        <h1>${gratuit ? '🎁 Réclamer l\'accès gratuit' : '🛒 Finaliser votre commande'}</h1>
        <div class="subtitle">${isVirtuel?'Accès immédiat après paiement, par WhatsApp.':'Notre équipe vous contacte pour la livraison.'}</div>

        <div class="field">
          <label>Nom complet <span class="req">*</span></label>
          <input type="text" id="ck-nom" value="${escapeHtml(nomPrerempli)}" placeholder="Ex: Yawa Komla" required>
        </div>

        <div class="field">
          <label>Téléphone WhatsApp <span class="req">*</span></label>
          <input type="tel" id="ck-tel" value="${escapeHtml(telPrerempli)}" placeholder="Ex: +228 90 12 34 56" required>
          <div class="hint">Important : c'est sur ce numéro que vous recevrez le ${isVirtuel?'lien d\'accès':'confirmation de livraison'}.</div>
        </div>

        ${!isVirtuel ? `
          <div class="field">
            <label>Adresse de livraison <span class="req">*</span></label>
            <textarea id="ck-adresse" placeholder="Ex: Lomé, quartier Bè, près du marché, maison rouge..." required></textarea>
            <button type="button" class="geoloc-btn" id="ckGeolocBtn" onclick="capturerGeoloc()">
              📍 Partager ma position actuelle (optionnel)
            </button>
          </div>
        ` : ''}

        ${!isVirtuel && !gratuit ? `
          <div class="field">
            <label>Mode de paiement</label>
            <div class="mode-paiement">
              <div class="mode-card ${_mode==='fedapay'?'active':''}" onclick="choisirMode('fedapay')">
                <div class="mode-card-ico">💳</div>
                <div class="mode-card-title">Payer maintenant</div>
                <div class="mode-card-sub">Mobile Money / Carte</div>
              </div>
              <div class="mode-card ${_mode==='livraison'?'active':''}" onclick="choisirMode('livraison')">
                <div class="mode-card-ico">📍</div>
                <div class="mode-card-title">Payer à la livraison</div>
                <div class="mode-card-sub">Cash à la réception</div>
              </div>
            </div>
          </div>
        ` : ''}

        <div class="warning">
          ⚠️ <b>Important :</b> après confirmation, WhatsApp s'ouvrira automatiquement avec un message à envoyer à ATM. <b>Sans cette étape, votre commande ne sera pas traitée.</b>
        </div>

        <button id="btnPayer" class="btn-payer" onclick="finaliser()">
          ${gratuit ? '🎁 Confirmer & envoyer à ATM' : (_mode==='fedapay' || isVirtuel ? '💳 Payer ' + fcfa(total) : '📍 Confirmer & envoyer à ATM')}
        </button>
      </div>

      <div class="recap">
        <div class="card">
          <h2>Récapitulatif</h2>
          <div class="recap-img">
            ${p.image_url ? `<img src="${escapeHtml(p.image_url)}" alt="" onerror="this.style.display='none';this.parentElement.querySelector('.recap-img-ph').removeAttribute('hidden')">` : ''}
            <div class="recap-img-ph" ${p.image_url?'hidden':''}>${isVirtuel?'📚':'🌾'}</div>
          </div>
          <div class="recap-titre">${escapeHtml(p.titre)}</div>
          <div class="recap-line"><span>Type</span><span>${isVirtuel?(p.sous_type==='video'?'🎬 Formation vidéo':'📄 Livre PDF'):'📦 Livraison'}</span></div>
          ${!isVirtuel ? `<div class="recap-line"><span>Quantité</span><span>× ${qte} ${escapeHtml(p.unite||'unité')}</span></div>` : ''}
          <div class="recap-line"><span>Prix unitaire</span><span>${fcfa(p.prix)}</span></div>
          <div class="recap-line total"><span>Total</span><span class="montant">${gratuit ? 'Gratuit 🎁' : fcfa(total)}</span></div>
        </div>
      </div>
    </div>
  `;
}

function choisirMode(m){
  _mode = m;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const total = _produit.prix * qteInit;
  document.getElementById('btnPayer').textContent = m==='fedapay' ? `💳 Payer ${fcfa(total)}` : `📍 Confirmer & envoyer à ATM`;
}

function capturerGeoloc(){
  if(!navigator.geolocation){ alert('Géolocalisation non disponible sur ce navigateur.'); return; }
  const btn = document.getElementById('ckGeolocBtn');
  btn.textContent = '⏳ Récupération...';
  navigator.geolocation.getCurrentPosition(pos => {
    _geoloc = `${pos.coords.latitude.toFixed(6)},${pos.coords.longitude.toFixed(6)}`;
    btn.textContent = '✓ Position capturée';
    btn.classList.add('ok');
  }, err => {
    btn.textContent = '📍 Réessayer';
    alert('Impossible de capturer votre position : ' + err.message);
  }, {enableHighAccuracy:true, timeout:10000});
}

async function finaliser(){
  const nom = document.getElementById('ck-nom').value.trim();
  const tel = document.getElementById('ck-tel').value.trim();
  const adresse = document.getElementById('ck-adresse')?.value.trim() || '';

  if(nom.length < 2){ alert('Nom requis (2 lettres min)'); return; }
  if(tel.length < 6){ alert('Numéro WhatsApp requis'); return; }
  if(_produit.type === 'reel' && adresse.length < 5){ alert('Adresse de livraison requise'); return; }

  const isVirtuel = _produit.type === 'virtuel';
  const qte = isVirtuel ? 1 : qteInit;
  const montant = gratuit ? 0 : (_produit.prix * qte);
  const mode = gratuit ? null : (isVirtuel ? 'fedapay' : _mode);

  // Insérer la commande en pending
  const { data, error } = await SHOP_SB.from('commandes').insert({
    type: _produit.type,
    produit_table: _produit.table,
    produit_id: _produit.id,
    produit_titre: _produit.titre,
    client_nom: nom,
    client_tel: tel,
    client_adresse: adresse || null,
    client_geoloc: _geoloc,
    quantite: qte,
    montant: montant,
    paye: gratuit, // gratuit → directement marqué payé
    mode_paiement: mode,
  }).select().single();

  if(error){
    alert('Erreur enregistrement commande : ' + error.message);
    return;
  }

  // Si gratuit ou paiement à la livraison → pas de FedaPay, redirection directe vers Merci
  if(gratuit || mode === 'livraison'){
    location.href = `/merci?cmd=${data.id}&mode=${mode||'gratuit'}`;
    return;
  }

  // Sinon : FedaPay
  if(typeof FedaPay === 'undefined'){
    alert('FedaPay indisponible. Contactez ATM directement sur WhatsApp +228 70 99 20 18.');
    return;
  }

  const btn = document.getElementById('btnPayer');
  btn.disabled = true;
  btn.textContent = '⏳ Ouverture du paiement...';

  FedaPay.init({
    public_key: FEDAPAY_PUBLIC_KEY,
    transaction: {
      amount: montant,
      description: _produit.titre + (qte>1 ? ` × ${qte}` : ''),
    },
    customer: {
      firstname: nom.split(' ')[0] || nom,
      lastname: nom.split(' ').slice(1).join(' ') || '',
      phone_number: { number: tel, country: 'TG' },
    },
    onComplete: async (obj) => {
      if(obj.reason === FedaPay.CHECKOUT_COMPLETED){
        // Marquer comme payé
        const ref = obj.transaction?.reference || obj.transaction?.id || '';
        await SHOP_SB.from('commandes').update({
          paye: true,
          fedapay_ref: String(ref),
          updated_at: new Date().toISOString(),
        }).eq('id', data.id);

        // Si virtuel : créer token d'accès
        if(_produit.type === 'virtuel' && _produit.lien_contenu){
          const token = genererToken(24);
          await SHOP_SB.from('acces_virtuels').insert({
            commande_id: data.id,
            token: token,
            lien_reel: _produit.lien_contenu,
          });
        }
        location.href = `/merci?cmd=${data.id}&mode=fedapay`;
      } else if(obj.reason === FedaPay.DIALOG_DISMISSED){
        btn.disabled = false;
        btn.textContent = `💳 Payer ${fcfa(montant)}`;
      }
    },
  }).open();
}

function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
